name: Email Triage

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Gmail credentials
        run: |
          echo "${{ secrets.GMAIL_CREDENTIALS }}" | base64 -d > credentials.json
          echo "${{ secrets.GMAIL_TOKEN }}" | base64 -d > token.json

      - name: Run triage
        env:
          OPENROUTER_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python triage.py --limit 20
